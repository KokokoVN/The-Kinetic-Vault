server.port=8826
spring.application.name=ai-chatbot-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Ollama miễn phí (cục bộ): bật 1 dòng — hoặc chạy npm run dev:chatbot:ollama từ thư mục gốc repo
# spring.profiles.active=ollama

# Gọi catalog (Feign). Mặc định localhost giống các service khác; bỏ trống URL để chỉ dùng Eureka.
product.catalog.service.url=http://localhost:8810

# Gọi sale-service (Feign) để lấy chương trình khuyến mãi đang chạy.
sale.service.url=http://localhost:8816

# LLM (API kiểu OpenAI). Key: biến môi trường OPENAI_API_KEY hoặc application-local.properties (profile local).
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
openai.model=gemini-2.5-flash
# Miễn phí — Ollama cục bộ: đặt require-key=false, url + model bên dưới (cài Ollama, chạy model trước).
# openai.api.require-key=false
# openai.api.url=http://127.0.0.1:11434/v1/chat/completions
# openai.model=llama3.2
# Miễn phí có hạn — Groq (lấy key free tại console.groq.com), cùng format OpenAI:
# openai.api.url=https://api.groq.com/openai/v1/chat/completions
# openai.model=llama-3.1-8b-instant

# Giới hạn số sản phẩm đưa vào prompt (tránh vượt context)
chatbot.catalog.max-products=80

server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
