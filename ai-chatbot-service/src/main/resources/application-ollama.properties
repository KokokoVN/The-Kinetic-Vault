# Profile: Ollama chạy trên máy (miễn phí). Bật bằng: spring.profiles.active=ollama
# Bước: cài Ollama https://ollama.com — terminal chạy: ollama pull llama3.2 — để Ollama chạy nền.

openai.api.require-key=false
# Dùng 127.0.0.1 thay vì localhost — tránh Windows ưu tiên IPv6 (::1) trong khi Ollama chỉ nghe IPv4.
openai.api.url=http://127.0.0.1:11434/v1/chat/completions
openai.model=llama3.2
# Ghi đè để không gửi nhầm key cloud nếu máy bạn có OPENAI_API_KEY
openai.api.key=

# Tiếng Việt ổn hơn có thể thử: openai.model=qwen2.5:7b (cần ollama pull trước)
