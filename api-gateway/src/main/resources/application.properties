#Server port
server.port= 8900

#Application name
spring.application.name= api-gateway

#Client registration options :
eureka.client.service-url.defaultZone = http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

zuul.prefix=/api
zuul.ignored-services=*

# Map paths to services
#----------------------------------
# User service :
zuul.routes.userservice.path=/accounts/**
zuul.routes.userservice.service-id=user-service

# Registration shortcut routes (legacy frontend path)
zuul.routes.registrationservice.path=/registration/**
zuul.routes.registrationservice.service-id=user-service
zuul.routes.registrationservice.strip-prefix=false

# Catalog service :
zuul.routes.catalogservice.path=/catalog/**
zuul.routes.catalogservice.service-id=product-catalog-service

# Inventory service :
zuul.routes.inventoryservice.path=/inventory/**
zuul.routes.inventoryservice.service-id=inventory-service

# Payment service :
zuul.routes.paymentservice.path=/payments/**
zuul.routes.paymentservice.service-id=payment-service

# Notification service :
zuul.routes.notificationservice.path=/notifications/**
zuul.routes.notificationservice.service-id=notification-service



# Activity log service :
zuul.routes.activitylogservice.path=/activity/**
zuul.routes.activitylogservice.service-id=activity-log-service

# Cart service (khai bao cu the truoc /shop/**):
zuul.routes.cartservice.path=/shop/cart/**
zuul.routes.cartservice.service-id=cart-service
zuul.routes.cartadminservice.path=/shop/carts/**
zuul.routes.cartadminservice.service-id=cart-service

# Order service :
zuul.routes.orderservice.path=/shop/**
zuul.routes.orderservice.url=http://localhost:8813

# Recommendation service (legacy /review path from old times):
zuul.routes.recommendationservice.path=/review/**
zuul.routes.recommendationservice.url=http://localhost:8812

# Review service (new true reviews)
zuul.routes.reviewservice.path=/reviews/**
zuul.routes.reviewservice.service-id=review-service

# AI chatbot (tư vấn — gọi LLM + catalog nội bộ)
zuul.routes.aichatbotservice.path=/chatbot/**
zuul.routes.aichatbotservice.service-id=ai-chatbot-service

# Sale service (khuyến mãi, voucher, banner)
zuul.routes.saleservice.path=/sales/**
zuul.routes.saleservice.service-id=sale-service

# Telegram service (tích hợp bot)
zuul.routes.telegramservice.path=/telegram/**
zuul.routes.telegramservice.service-id=telegram-service

# SPRING SESSION (dev): disable Redis dependency for gateway
spring.session.store-type=none
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Activity log (Feign -> activity-log-service, bất đồng bộ)
activity.logging.enabled=true

# JWT (secret phải giống user-service)
jwt.secret=RainbowForestEcommerceJWTSecretKey_ChangeInProduction_Min64Chars_RequiredForHS512!!
jwt.public-paths=/api/accounts/registration,/api/accounts/registration/**,/api/registration/**,/registration/**,/api/accounts/auth/**,/api/accounts/users/*/avatar/file/**,/api/accounts/users/**/avatar/file/**,/api/notifications/**,/api/catalog/**,/api/inventory/**,/api/shop/cart/**,/api/shop/orders/check,/api/shop/orders/check/**,/api/review/**,/api/chatbot/**,/api/accounts/addresses/**,/api/sales/active,/api/sales/banners,/api/sales/banners/image/**,/api/sales/vouchers/validate,/api/sales/vouchers/active,/api/reviews/reviews/product/**,/api/reviews/media/**

#SECURITY
#---------------------------------
zuul.sensitive-headers=

# Timeout de tranh 504 khi service khoi dong cham / request dau tien
ribbon.ConnectTimeout=5000
ribbon.ReadTimeout=30000
hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds=80000
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
zuul.host.max-total-connections=500
zuul.host.max-per-route-connections=100

# Allow forwarding larger multipart payloads (avatar upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


