server.port=8821
spring.application.name=cart-service
server.url=http://localhost:8821

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.session.store-type=redis
spring.session.redis.namespace=session
spring.redis.host=localhost
spring.redis.port=6379

spring.main.allow-bean-definition-overriding=true
spring.jackson.time-zone=Asia/Ho_Chi_Minh
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

jwt.secret=RainbowForestEcommerceJWTSecretKey_ChangeInProduction_Min64Chars_RequiredForHS512!!
jwt.validation.enabled=false
jwt.public-paths=/,/items,/clear,/cart,/cart/**,/shop/cart,/shop/cart/**

app.seed.enabled=false
