##### Service details: #####
server.port= 8811
spring.application.name= user-service
server.url= http://localhost:8811
logging.level.org.springframework.web=DEBUG

#Client registration properties :
eureka.client.service-url.defaultZone = http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Data source — MySQL (docker-compose: root/root, port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/users?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate — bang duoc tao/cap nhat tu entity (ddl-auto=update)
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jackson.time-zone=Asia/Ho_Chi_Minh
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JWT (phải trùng secret với api-gateway, tối thiểu ~64 ký tự cho HS512)
jwt.secret=RainbowForestEcommerceJWTSecretKey_ChangeInProduction_Min64Chars_RequiredForHS512!!
# access token (mặc định 15 phút); refresh token 7 ngày. Now set to 10 years for dev
jwt.expiration-ms=315360000000
jwt.refresh-expiration-ms=315360000000

# Seed du lieu mau (bat trong profile dev)
app.seed.enabled=false

# Registration activation flow
app.activation.verify-base-url=http://localhost:3000/register/verify
app.activation.token-expire-hours=24
app.activation.cleanup-interval-ms=300000
app.activation.cleanup-initial-delay-ms=60000
app.login-device.verify-base-url=http://localhost:3000/api/auth/device-approval
app.login-device.token-expire-minutes=15
app.notification.send-url=http://localhost:8815/send
app.password-reset.verify-base-url=http://localhost:3000/reset-password
app.password-reset.token-expire-minutes=30
app.password-reset.cleanup-interval-ms=300000
app.password-reset.cleanup-initial-delay-ms=60000

# Avatar upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.avatar.upload-dir=uploads/avatars
app.avatar.public-base-url=/api/accounts

##### HTTP #####
error.404.schema.details=The resource you are looking for might have been removed, had its name changed, or is temporarily unavailable
error.406.schema.details=This request is not acceptable. Supported MIME types are application/json